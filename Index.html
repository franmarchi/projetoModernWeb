<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/PatternStyle.css">
    <link rel="stylesheet" href="./css/Index.css">
    <title>Home</title>
</head>

<body>

    <section>
      
        <header class="logo">
            <li><i class="bi bi-image"></i></li>
            <br />
        </header>
    
    </section>

    <section>
        
        <main>
           
            <form>
                <section>
                    <label>E-mail</label>
                    <br />
                    <input type="text" id="txtEmail">
                    <br />

                    <br />
                    <input type="password" id="txtSenha">
                </section>
                <br />
                <section>
                    <button id="btnEntrar" class="btn-login">
                        ENTRAR
                    </button>
                    <br />
                    <div class="forgot">
                        Esqueceu sua senha?
                    </div>
                </section>
                <br />
            </form>
        
        </main>
    
    </section>

    <section>
        
        <footer>
           
            <button id="btnOrçamento" class="btn-orcamento">
                SOLICITE UM ORÇAMENTO
            </button>
       
        </footer>
    </section>

</html>
