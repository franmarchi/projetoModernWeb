<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Obra</title>

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/PatternStyle.css">
    <link rel="stylesheet" href="../css/Dailybuilding.css">
</head>

<body>

    <!-- Container geral -->
    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <div class="header-content">
                <h1>Diário de Obra</h1>
                <h2>Projeto Residencial XYZ</h2>
            </div>
        </header>

        <!-- MAIN -->
        <main class="main-content">
            <div class="main-wrapper">

                <form class="formulario">

                    <div class="card">

                        <!-- Área da imagem -->
                        <div class="card-image">
                            <figure>
                                <img src="../img/imagem-exemplo.jpg" alt="Imagem do andamento da obra">
                                <figcaption>Registro da obra</figcaption>
                            </figure>
                        </div>

                        <!-- (Espaço para futuros campos) -->
                        <div class="card-body">
                            <label>E-mail</label>
                            <input type="email">

                            <label>Senha</label>
                            <input type="password">

                            <button type="submit">ENTRAR</button>

                            <div class="forgot-password">Esqueceu a senha?</div>

                            <button type="button" class="secondary-button">
                                Solicite um orçamento
                            </button>
                        </div>

                    </div>

                </form>

            </div>
        </main>

        <!-- FOOTER -->
        <footer class="footer">
            <div class="footer-content">
                <button id="btnPaginaInicial" type="button">
                    <i class="bi bi-house-door"></i> Página Inicial
                </button>
            </div>
        </footer>

    </div>

</body>

</html>
