<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/PatternStyle.css">
    <!-- <link rel="stylesheet" href="../css/Dailybuilding.css"> -->

    <title>Diário de Obra</title>
</head>

<body>

    <div class="container">

        <header class="header">
            <div class="header-content">
                <h2 class="titulo">Projeto Residencial xyz</h2>
            </div>
        </header>

        <main class="main">
            <div class="main-content">

                <section class="diario">
                    <div class="diario-container">

                        <div class="diario-header">
                            <h3>Diário de Obra</h3>
                            <p>Acompanhe imagens da evolução</p>
                        </div>

                        <form class="form-diario">

                            <div class="imagem-container">

                                <figure class="imagem-preview">
                                    <img src="../img/exemplo.jpg" alt="Imagem da obra">
                                </figure>

                            </div>

                            <div class="acoes">

                                <button type="button" class="btn-acao">
                                    <i class="bi bi-image"></i>
                                    <span>Adicionar Foto</span>
                                </button>

                                <button type="button" class="btn-acao">
                                    <i class="bi bi-upload"></i>
                                    <span>Upload</span>
                                </button>

                            </div>

                        </form>

                    </div>
                </section>

            </div>
        </main>

        <footer class="footer">
            <div class="footer-content">
                <button id="btnPaginaInicial">
                    PÁGINA INICIAL
                </button>
            </div>
        </footer>

    </div>

</body>

</html>
