<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/PatternStyle.css">
    <link rel="stylesheet" href="../css/InitialPage.css">
    <title>Página Inicial</title>
</head>

<body>
    <section>
        <h2>
            Projeto Residencial xyz
        </h2>
        <br />
    </section>
    <main>

        <form>

            <section class="datas">

                <div class="campo">
                    <label>Data de Início da Obra</label>
                    <input type="date" id="dtInicio" value="2026-01-01">
                </div>

                <div class="campo">
                    <label>Data Prevista para Conclusão</label>
                    <input type="date" id="dtConclusao" value="2026-12-01">
                </div>

            </section>

            <section class="botoes">

                <button value="1">
                    <i class="bi bi-image"></i>
                </button>

                <button value="2">
                    <i class="bi bi-paperclip"></i>
                </button>

                <button value="3">
                    <i class="bi bi-currency-dollar"></i>
                </button>

                <button value="4">
                    <i class="bi bi-chat-dots"></i>
                </button>

            </section>

        </form>

    </main>
    <section>
        <footer>
            <button id="btnEncerrarSessao">
                ENCERRAR SESSÃO
            </button>
        </footer>
    </section>
</body>

</html>
