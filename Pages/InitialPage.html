<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/PatternStyle.css">
    <!-- <link rel="stylesheet" href="../css/InitialPage.css"> -->

    <title>Página Inicial</title>
</head>

<body>

    <div class="container">

        <header class="header">
            <div class="header-content">
                <h2 class="titulo">
                    Projeto Residencial xyz
                </h2>
            </div>
        </header>

        <main class="main">

            <div class="main-content">

                <form class="form">

                    <section class="datas">
                        <div class="datas-container">

                            <div class="campo">
                                <div class="campo-content">
                                    <label for="dtInicio">Data de Início da Obra</label>
                                    <input type="date" id="dtInicio" value="2026-01-01">
                                </div>
                            </div>

                            <div class="campo">
                                <div class="campo-content">
                                    <label for="dtConclusao">Data Prevista para Conclusão</label>
                                    <input type="date" id="dtConclusao" value="2026-12-01">
                                </div>
                            </div>

                        </div>
                    </section>

                    <section class="botoes">
                        <div class="botoes-container">

                            <div class="botao-item">
                                <button type="button" value="1">
                                    <i class="bi bi-image"></i>
                                </button>
                            </div>

                            <div class="botao-item">
                                <button type="button" value="2">
                                    <i class="bi bi-paperclip"></i>
                                </button>
                            </div>

                            <div class="botao-item">
                                <button type="button" value="3">
                                    <i class="bi bi-currency-dollar"></i>
                                </button>
                            </div>

                            <div class="botao-item">
                                <button type="button" value="4">
                                    <i class="bi bi-chat-dots"></i>
                                </button>
                            </div>

                        </div>
                    </section>

                </form>

            </div>

        </main>

        <footer class="footer">
            <div class="footer-content">
                <button id="btnEncerrarSessao">
                    ENCERRAR SESSÃO
                </button>
            </div>
        </footer>

    </div>

</body>

</html>
