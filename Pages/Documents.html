<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/PatternStyle.css">
    <!-- <link rel="stylesheet" href="../css/Documents.css"> -->

    <title>Documentos</title>
</head>

<body>

    <div class="container">

        <header class="header">
            <div class="header-content">
                <h2 class="titulo">Projeto Residencial xyz</h2>
            </div>
        </header>

        <main class="main">
            <div class="main-content">

                <section class="documentos concluidos">
                    <div class="documentos-container">

                        <div class="section-header">
                            <h3>Documentos Concluídos</h3>
                        </div>

                        <div class="documentos-lista">

                            <div class="documento-item">
                                <i class="bi bi-file-earmark-check"></i>
                                <span>documento1.doc</span>
                            </div>

                            <div class="documento-item">
                                <i class="bi bi-file-earmark-check"></i>
                                <span>documento2.doc</span>
                            </div>

                            <div class="documento-item">
                                <i class="bi bi-file-earmark-check"></i>
                                <span>documento3.doc</span>
                            </div>

                        </div>

                    </div>
                </section>

                <section class="documentos pendentes">
                    <div class="documentos-container">

                        <div class="section-header">
                            <h3>Documentos Pendentes</h3>
                        </div>

                        <div class="documentos-lista">

                            <div class="documento-item">
                                <div class="documento-info">
                                    <i class="bi bi-file-earmark"></i>
                                    <span>documento1.doc</span>
                                </div>
                                <div class="documento-acao">
                                    <button type="button">
                                        <i class="bi bi-paperclip"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="documento-item">
                                <div class="documento-info">
                                    <i class="bi bi-file-earmark"></i>
                                    <span>documento2.doc</span>
                                </div>
                                <div class="documento-acao">
                                    <button type="button">
                                        <i class="bi bi-paperclip"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="documento-item">
                                <div class="documento-info">
                                    <i class="bi bi-file-earmark"></i>
                                    <span>documento3.doc</span>
                                </div>
                                <div class="documento-acao">
                                    <button type="button">
                                        <i class="bi bi-paperclip"></i>
                                    </button>
                                </div>
                            </div>

                        </div>

                    </div>
                </section>

            </div>
        </main>

        <footer class="footer">
            <div class="footer-content">
                <button id="btnPaginaInicial">
                    PÁGINA INICIAL
                </button>
            </div>
        </footer>

    </div>

</body>

</html>
